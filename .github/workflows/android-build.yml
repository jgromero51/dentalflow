name: Build Android APK

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  build-android:
    name: Build Android App
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'

      - name: Install Node dependencies
        run: npm install --include=dev

      # Java 21 requerido por Capacitor Android
      - name: Setup Java 21
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '21'

      # SDK 36 ya está pre-instalado en ubuntu-latest.
      # Solo creamos local.properties apuntando al SDK existente.
      - name: Create local.properties
        run: echo "sdk.dir=$ANDROID_SDK_ROOT" > android/local.properties

      # Aceptar licencias sin necesitar sdkmanager en PATH
      - name: Accept Android SDK licenses
        run: |
          mkdir -p $ANDROID_SDK_ROOT/licenses
          echo "24333f8a63b6825ea9c5514f83c2829b004d1fee" > $ANDROID_SDK_ROOT/licenses/android-sdk-license
          echo "84831b9409646a918e30573bab4c9c91346d8abd" >> $ANDROID_SDK_ROOT/licenses/android-sdk-license

      - name: Sync Capacitor
        run: npx cap sync android

      - name: Make gradlew executable
        working-directory: ./android
        run: chmod +x gradlew

      # Captura el output completo de Gradle
      - name: Build Debug APK
        working-directory: ./android
        run: |
          set +e
          ./gradlew assembleDebug --no-daemon --stacktrace --console=plain > /tmp/gradle.log 2>&1
          BUILD_EXIT=$?
          echo "=== BUILD RESULT: EXIT $BUILD_EXIT ==="
          tail -100 /tmp/gradle.log
          exit $BUILD_EXIT

      - name: Upload APK
        if: success()
        uses: actions/upload-artifact@v4
        with:
          name: DentalFlow-App
          path: android/app/build/outputs/apk/debug/app-debug.apk

      - name: Upload Gradle Build Log
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: gradle-build-log
          path: /tmp/gradle.log
