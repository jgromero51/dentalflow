name: Build Android APK

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  build-android:
    name: Build Android App
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      # Node.js es necesario para que node_modules/@capacitor/android
      # esté disponible para Gradle (referenciado en capacitor.settings.gradle)
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'

      - name: Install Node dependencies (Gradle needs @capacitor/android)
        run: npm install --include=dev

      # Java 21 requerido por Capacitor Android (JavaVersion.VERSION_21)
      - name: Setup Java 21
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '21'

      # SDK 35 ya está pre-instalado en ubuntu-latest
      - name: Create local.properties
        run: echo "sdk.dir=$ANDROID_SDK_ROOT" > android/local.properties

      - name: Accept SDK licenses
        run: |
          export PATH="$ANDROID_SDK_ROOT/cmdline-tools/latest/bin:$ANDROID_SDK_ROOT/tools/bin:$PATH"
          yes | sdkmanager --licenses > /dev/null 2>&1 || true

      # Copiar frontend (equivalente a cap sync, sin necesitar el CLI)
      - name: Copy frontend assets into Android project
        run: |
          mkdir -p android/app/src/main/assets/public
          cp -r frontend/. android/app/src/main/assets/public/
          cp capacitor.config.json android/app/src/main/assets/capacitor.config.json
          echo '[]' > android/app/src/main/assets/capacitor.plugins.json

      - name: Create Cordova config.xml
        run: |
          mkdir -p android/app/src/main/res/xml
          cat > android/app/src/main/res/xml/config.xml << 'EOF'
          <?xml version='1.0' encoding='utf-8'?>
          <widget version="1.0.0" xmlns="http://www.w3.org/ns/widgets" xmlns:cdv="http://cordova.apache.org/ns/1.0">
            <access origin="*" />
          </widget>
          EOF

      - name: Make gradlew executable
        working-directory: ./android
        run: chmod +x gradlew

      - name: Build Debug APK
        working-directory: ./android
        run: ./gradlew assembleDebug --no-daemon --stacktrace

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: DentalFlow-App
          path: android/app/build/outputs/apk/debug/app-debug.apk
