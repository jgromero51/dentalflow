/**
 * DentalFlow — Configuración de Despliegue Profesional (SQLite + Disco Persistente)
 */
services:
  - type: web
    name: dentalflow
    runtime: node
    plan: starter # Plan Starter para evitar que la app se duerma
    buildCommand: "npm install && cd backend && npm install"
    startCommand: "npm start"
    disk:
      name: data
      mountPath: /data
      sizeGB: 1 # Disco permanente para que los datos jamás se borren
    envVars:
      - key: NODE_ENV
        value: development
      - key: DB_PATH
        value: /data/dentalflow.db
      - key: JWT_SECRET
        generateValue: true
      - key: WHATSAPP_VERIFY_TOKEN
        value: "dentalflow_secure_token_2024"
      - key: FRONTEND_URL
        value: "https://dentalflow-mqgh.onrender.com"
