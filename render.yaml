services:
  - type: web
    name: dentalflow
    env: node
    plan: free
    buildCommand: "npm install"
    startCommand: "npm start"
    envVars:
      - key: NODE_ENV
        value: production
      - key: DB_PATH
        value: /data/dentalflow.db
      - key: JWT_SECRET
        generateValue: true
      - key: DEMO_MODE
        value: "false"
      - key: WHATSAPP_VERIFY_TOKEN
        value: "dentalflow_webhook_secret_2024"
      - key: WHATSAPP_TOKEN
        value: "PEGA_AQUI_TU_TOKEN_DE_META"
      - key: WHATSAPP_PHONE_NUMBER_ID
        value: "PEGA_AQUI_TU_ID_DE_TELEFONO"
