services:
  - type: web
    name: dentalflow
    env: node
    plan: free
    buildCommand: "npm install"
    startCommand: "npm start"
    envVars:
      - key: NODE_ENV
        value: production
      - key: DB_PATH
        value: /data/dentalflow.db
      - key: JWT_SECRET
        generateValue: true
      - key: DEMO_MODE
        value: "false"
    disk:
      name: dentalflow-data
      mountPath: /data
      sizeGB: 1
